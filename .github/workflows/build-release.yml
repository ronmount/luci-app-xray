name: Build and Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

env:
  CORE_PKG_NAME: luci-app-xray
  STATUS_PKG_NAME: luci-app-xray-status
  CORE_SOURCE_SUBDIR: core
  STATUS_SOURCE_SUBDIR: status
  CORE_BUILD_DIR: package/custom/luci-app-xray
  STATUS_BUILD_DIR: package/custom/luci-app-xray-status

jobs:
  release:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            sdk_url_path: https://downloads.openwrt.org/releases/25.12.2/targets/x86/64
            sdk_file_glob: openwrt-sdk-25.12.*-x86-64*.tar.zst

    env:
      SDK_URL_PATH: ${{ matrix.sdk_url_path }}
      SDK_FILE_GLOB: ${{ matrix.sdk_file_glob }}
      CONFIG_CCACHE: y

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Cache Key
        id: cache_key
        shell: bash
        run: echo "timestamp=$(date +'%s')" >> "$GITHUB_OUTPUT"

      - name: Init Paths
        shell: bash
        run: |
          set -euo pipefail

          CACHE_DIR="${HOME}/cache"
          CCACHE_DIR="${GITHUB_WORKSPACE}/.ccache"

          mkdir -p "$CACHE_DIR/sdk" "$CACHE_DIR/dl" "$CACHE_DIR/feeds" "$CCACHE_DIR"

          echo "CACHE_DIR=$CACHE_DIR" >> "$GITHUB_ENV"
          echo "CACHE_DIR_SDK=$CACHE_DIR/sdk" >> "$GITHUB_ENV"
          echo "CACHE_DIR_DL=$CACHE_DIR/dl" >> "$GITHUB_ENV"
          echo "CACHE_DIR_FEEDS=$CACHE_DIR/feeds" >> "$GITHUB_ENV"
          echo "CCACHE_DIR=$CCACHE_DIR" >> "$GITHUB_ENV"
          echo "SDK_HOME=$(mktemp -d)" >> "$GITHUB_ENV"

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CACHE_DIR }}
            ${{ env.CCACHE_DIR }}
          key: openwrt-${{ matrix.arch }}-${{ steps.cache_key.outputs.timestamp }}
          restore-keys: |
            openwrt-${{ matrix.arch }}-

      - name: Install Dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses5-dev libssl-dev python3 python3-setuptools rsync \
            unzip zlib1g-dev file wget xsltproc ccache tar zstd

      - name: Download and Unpack SDK
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$CACHE_DIR_SDK"
          cd "$CACHE_DIR_SDK"

          wget -q -O sha256sums "$SDK_URL_PATH/sha256sums"

          SDK_FILE="$(
            awk '{print $2}' sha256sums \
              | sed 's/^\*//' \
              | while read -r f; do
                  case "$f" in
                    $SDK_FILE_GLOB)
                      echo "$f"
                      break
                      ;;
                  esac
                done
          )"

          if [ -z "$SDK_FILE" ]; then
            echo "::error::Cannot find SDK file by glob: $SDK_FILE_GLOB"
            awk '{print $2}' sha256sums | sed 's/^\*//'
            exit 1
          fi

          awk -v file="$SDK_FILE" '$2 == "*"file || $2 == file {print}' sha256sums > sha256sums.small

          if [ ! -f "$SDK_FILE" ] || ! sha256sum -c sha256sums.small >/dev/null 2>&1; then
            wget -q -O "$SDK_FILE" "$SDK_URL_PATH/$SDK_FILE"
          fi

          sha256sum -c sha256sums.small
          tar --zstd -C "$SDK_HOME" -xf "$CACHE_DIR_SDK/$SDK_FILE" --strip=1

          cd "$SDK_HOME"
          rm -rf dl feeds
          ln -s "$CACHE_DIR_DL" dl
          ln -s "$CACHE_DIR_FEEDS" feeds

          cp feeds.conf.default feeds.conf
          sed -i 's#git.openwrt.org/openwrt/openwrt#github.com/openwrt/openwrt#' feeds.conf
          sed -i 's#git.openwrt.org/feed/packages#github.com/openwrt/packages#' feeds.conf
          sed -i 's#git.openwrt.org/project/luci#github.com/openwrt/luci#' feeds.conf
          sed -i 's#git.openwrt.org/feed/telephony#github.com/openwrt/telephony#' feeds.conf

      - name: Update feeds
        shell: bash
        run: |
          set -euo pipefail
          cd "$SDK_HOME"
          ./scripts/feeds update -a

      - name: Install only required feed packages
        shell: bash
        run: |
          set -euo pipefail
          cd "$SDK_HOME"

          ./scripts/feeds install luci-base
          ./scripts/feeds install firewall4
          ./scripts/feeds install dnsmasq
          ./scripts/feeds install ca-bundle
          ./scripts/feeds install wget || true
          ./scripts/feeds install xray-core || true

      - name: Place custom packages
        shell: bash
        run: |
          set -euo pipefail
          cd "$SDK_HOME"

          mkdir -p "$(dirname "$CORE_BUILD_DIR")"

          ln -s "${GITHUB_WORKSPACE}/${CORE_SOURCE_SUBDIR}" "$CORE_BUILD_DIR"
          ln -s "${GITHUB_WORKSPACE}/${STATUS_SOURCE_SUBDIR}" "$STATUS_BUILD_DIR"

          test -f "$CORE_BUILD_DIR/Makefile"
          test -f "$STATUS_BUILD_DIR/Makefile"

          echo "Core package:"
          ls -lah "$CORE_BUILD_DIR"
          echo "Status package:"
          ls -lah "$STATUS_BUILD_DIR"

      - name: Prepare minimal config
        shell: bash
        run: |
          set -euo pipefail
          cd "$SDK_HOME"

          cat > .config <<'EOF'
          CONFIG_ALL_NONSHARED=n
          CONFIG_ALL_KMODS=n
          CONFIG_ALL=n
          CONFIG_AUTOREMOVE=y
          CONFIG_PACKAGE_luci-app-xray=m
          CONFIG_PACKAGE_luci-app-xray-status=m
          EOF

          make oldconfig </dev/null

      - name: Build packages
        shell: bash
        run: |
          set -euo pipefail
          cd "$SDK_HOME"

          make package/custom/luci-app-xray/clean V=s
          make package/custom/luci-app-xray/compile V=s

          make package/custom/luci-app-xray-status/clean V=s
          make package/custom/luci-app-xray-status/compile V=s

          echo "Built packages:"
          find "$SDK_HOME/bin/" -type f \( -name "*.apk" -o -name "*.ipk" \) | sort

      - name: Copy built packages
        shell: bash
        run: |
          set -euo pipefail

          find "$SDK_HOME/bin/" -type f \( \
            -name "luci-app-xray*.apk" -o \
            -name "luci-app-xray-status*.apk" \
          \) -exec cp {} "$GITHUB_WORKSPACE" \;

          COUNT="$(find "$GITHUB_WORKSPACE" -maxdepth 1 -type f \( \
            -name "luci-app-xray*.apk" -o \
            -name "luci-app-xray-status*.apk" \
          \) | wc -l)"

          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No expected .apk files found after build"
            find "$SDK_HOME/bin/" -type f | sort
            exit 1
          fi

          find "$GITHUB_WORKSPACE" -maxdepth 1 -type f \( \
            -name "luci-app-xray*.apk" -o \
            -name "luci-app-xray-status*.apk" \
          \) -exec ls -lh {} \;

      - name: Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify Release Publish
    runs-on: ubuntu-24.04
    env:
      TRIGGER_URL: ${{ secrets.TRIGGER_URL }}
      TRIGGER_TOKEN: ${{ secrets.TRIGGER_TOKEN }}
    needs: release
    steps:
      - name: Notify Jenkins
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${TRIGGER_URL:-}" ] ; then
            echo "::warning::No trigger url found, skip..."
            exit 0
          fi

          curl -X POST \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "Authorization: Bearer $TRIGGER_TOKEN" \
            -d "{\"event\":\"release\",\"repository\":\"${{ github.repository }}\",\"ref\":\"${{ github.ref }}\"}" \
            "$TRIGGER_URL" || true
