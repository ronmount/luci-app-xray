name: Build and Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

env:
  PACKAGE_NAME: luci-app-xray

jobs:
  release:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            sdk_url_path: https://downloads.openwrt.org/releases/25.12.2/targets/x86/64
            sdk_file_glob: openwrt-sdk-25.12.*-x86-64*.tar.zst

    env:
      SDK_URL_PATH: ${{ matrix.sdk_url_path }}
      SDK_FILE_GLOB: ${{ matrix.sdk_file_glob }}
      CONFIG_CCACHE: y

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Cache Key
        id: cache_key
        shell: bash
        run: echo "timestamp=$(date +'%s')" >> "$GITHUB_OUTPUT"

      - name: Init Paths
        shell: bash
        run: |
          set -euo pipefail

          CACHE_DIR="${HOME}/cache"
          CCACHE_DIR="${GITHUB_WORKSPACE}/.ccache"

          mkdir -p "$CACHE_DIR/sdk" "$CACHE_DIR/dl" "$CACHE_DIR/feeds" "$CCACHE_DIR"

          echo "CACHE_DIR=$CACHE_DIR" >> "$GITHUB_ENV"
          echo "CACHE_DIR_SDK=$CACHE_DIR/sdk" >> "$GITHUB_ENV"
          echo "CACHE_DIR_DL=$CACHE_DIR/dl" >> "$GITHUB_ENV"
          echo "CACHE_DIR_FEEDS=$CACHE_DIR/feeds" >> "$GITHUB_ENV"
          echo "CCACHE_DIR=$CCACHE_DIR" >> "$GITHUB_ENV"
          echo "SDK_HOME=$(mktemp -d)" >> "$GITHUB_ENV"

          echo "Using CACHE_DIR=$CACHE_DIR"
          echo "Using CCACHE_DIR=$CCACHE_DIR"

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CACHE_DIR }}
            ${{ env.CCACHE_DIR }}
          key: openwrt-${{ matrix.arch }}-${{ env.PACKAGE_NAME }}-${{ steps.cache_key.outputs.timestamp }}
          restore-keys: |
            openwrt-${{ matrix.arch }}-${{ env.PACKAGE_NAME }}-

      - name: Install Dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses5-dev libssl-dev python3 python3-setuptools rsync \
            unzip zlib1g-dev file wget xsltproc ccache tar zstd

      - name: Download and Unpack SDK
        shell: bash
        run: |
          set -euo pipefail

          echo "CACHE_DIR_SDK=$CACHE_DIR_SDK"
          echo "SDK_URL_PATH=$SDK_URL_PATH"
          echo "SDK_FILE_GLOB=$SDK_FILE_GLOB"
          echo "SDK_HOME=$SDK_HOME"

          mkdir -p "$CACHE_DIR_SDK"
          cd "$CACHE_DIR_SDK"

          wget -q -O sha256sums "$SDK_URL_PATH/sha256sums"

          SDK_FILE="$(
            awk '{print $2}' sha256sums \
              | sed 's/^\*//' \
              | while read -r f; do
                  case "$f" in
                    $SDK_FILE_GLOB)
                      echo "$f"
                      break
                      ;;
                  esac
                done
          )"

          if [ -z "$SDK_FILE" ]; then
            echo "::error::Cannot find SDK file by glob: $SDK_FILE_GLOB"
            echo "Available files in sha256sums:"
            awk '{print $2}' sha256sums | sed 's/^\*//'
            exit 1
          fi

          echo "Selected SDK_FILE=$SDK_FILE"

          awk -v file="$SDK_FILE" '$2 == "*"file || $2 == file {print}' sha256sums > sha256sums.small

          if [ ! -s sha256sums.small ]; then
            echo "::error::Failed to extract checksum for $SDK_FILE"
            exit 1
          fi

          if [ ! -f "$SDK_FILE" ] || ! sha256sum -c sha256sums.small >/dev/null 2>&1; then
            wget -q -O "$SDK_FILE" "$SDK_URL_PATH/$SDK_FILE"
          fi

          sha256sum -c sha256sums.small
          ls -lah "$CACHE_DIR_SDK"
          file "$CACHE_DIR_SDK/$SDK_FILE"

          rm -rf "$SDK_HOME"/*
          tar --zstd -C "$SDK_HOME" -xf "$CACHE_DIR_SDK/$SDK_FILE" --strip=1

          cd "$SDK_HOME"
          rm -rf dl feeds
          ln -s "$CACHE_DIR_DL" dl
          ln -s "$CACHE_DIR_FEEDS" feeds

          cp feeds.conf.default feeds.conf
          sed -i 's#git.openwrt.org/openwrt/openwrt#github.com/openwrt/openwrt#' feeds.conf
          sed -i 's#git.openwrt.org/feed/packages#github.com/openwrt/packages#' feeds.conf
          sed -i 's#git.openwrt.org/project/luci#github.com/openwrt/luci#' feeds.conf
          sed -i 's#git.openwrt.org/feed/telephony#github.com/openwrt/telephony#' feeds.conf

          echo "SDK unpacked successfully"
          ls -lah "$SDK_HOME"

      - name: Update and Install Feeds
        shell: bash
        run: |
          set -euo pipefail

          cd "$SDK_HOME"
          ./scripts/feeds update -a
          ln -s "${{ github.workspace }}" "package/$PACKAGE_NAME"
          ./scripts/feeds install -a

      - name: Build Package
        shell: bash
        run: |
          set -euo pipefail

          cd "$SDK_HOME"
          make defconfig
          make package/${PACKAGE_NAME}/clean V=s
          make package/${PACKAGE_NAME}/compile V=s

          echo "Built packages:"
          find "$SDK_HOME/bin/" -type f \( -name "*.apk" -o -name "*.ipk" \) -exec ls -lh {} \;

      - name: Copy Built Packages
        shell: bash
        run: |
          set -euo pipefail

          find "$SDK_HOME/bin/" -type f -name "${PACKAGE_NAME}*.apk" -exec cp {} "${{ github.workspace }}" \;

          if ! find "${{ github.workspace }}" -type f -name "*.apk" | grep -q .; then
            echo "::error::No .apk files found after build"
            exit 1
          fi

          find "${{ github.workspace }}" -type f -name "*.apk" -exec ls -lh {} \;

      - name: Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: "*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify Release Publish
    runs-on: ubuntu-24.04
    env:
      TRIGGER_URL: ${{ secrets.TRIGGER_URL }}
      TRIGGER_TOKEN: ${{ secrets.TRIGGER_TOKEN }}
    needs: release
    steps:
      - name: Notify Jenkins
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${TRIGGER_URL:-}" ] ; then
            echo "::warning::No trigger url found, skip..."
            exit 0
          fi

          curl -X POST \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "Authorization: Bearer $TRIGGER_TOKEN" \
            -d "{\"event\":\"release\",\"repository\":\"${{ github.repository }}\",\"ref\":\"${{ github.ref }}\"}" \
            "$TRIGGER_URL" || true
